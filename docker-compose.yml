services:
  db:
    image: postgres:17-alpine
    container_name: matrix-db
    restart: always
    environment:
      - POSTGRES_DB=${MATRIX_DB_NAME:-matrixhub}
      - POSTGRES_USER=${MATRIX_DB_USER:-matrix}
      - POSTGRES_PASSWORD=${MATRIX_DB_PASSWORD:-matrix}
    ports:
      - "5434:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - matrix-app-net

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: matrix-app
    restart: always
    environment:
      - DATABASE_URL=postgresql+psycopg://${MATRIX_DB_USER:-matrix}:${MATRIX_DB_PASSWORD:-matrix}@db:5432/${MATRIX_DB_NAME:-matrixhub}
      - JWT_SECRET=${MATRIX_JWT_SECRET:-change-me}
      - DEFAULT_ADMIN_USERNAME=${MATRIX_DEFAULT_ADMIN_USERNAME:-admin}
      - DEFAULT_ADMIN_PASSWORD=${MATRIX_DEFAULT_ADMIN_PASSWORD:-admin}
      - CORS_ORIGINS=${MATRIX_CORS_ORIGINS:-http://localhost:5173,http://frontend,https://resonance.tatarinovi.ru}
      - MATRIX_HOMESERVER=${MATRIX_HOMESERVER:-https://matrix.example.com}
      - MATRIX_USER_ID=${MATRIX_USER_ID:-@bot:example.com}
      - S3_ENDPOINT=http://matrix-minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-matrix}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-matrix123}
      - S3_BUCKET=attachments
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-https://resonance.tatarinovi.ru/files}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 120s
    ports:
      - "8000:8000"
    networks:
      - matrix-app-net

  bot:
    build:
      context: ./backend
      dockerfile: Dockerfile.bot
    container_name: matrix-bot
    restart: always
    environment:
      - DATABASE_URL=postgresql+psycopg://${MATRIX_DB_USER:-matrix}:${MATRIX_DB_PASSWORD:-matrix}@db:5432/${MATRIX_DB_NAME:-matrixhub}
      - JWT_SECRET=${MATRIX_JWT_SECRET:-change-me}
      - DEFAULT_ADMIN_USERNAME=${MATRIX_DEFAULT_ADMIN_USERNAME:-admin}
      - DEFAULT_ADMIN_PASSWORD=${MATRIX_DEFAULT_ADMIN_PASSWORD:-admin}
      - MATRIX_HOMESERVER=${MATRIX_HOMESERVER:-https://matrix.example.com}
      - MATRIX_USER_ID=${MATRIX_USER_ID:-@bot:example.com}
      - MATRIX_ACCESS_TOKEN=${MATRIX_ACCESS_TOKEN:-}
      - MATRIX_DEVICE_ID=${MATRIX_DEVICE_ID:-}
      - MATRIX_PASSWORD=${MATRIX_PASSWORD:-}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - matrix-app-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: matrix-frontend
    restart: always
    depends_on:
      - app
    networks:
      - matrix-app-net

  minio:
    image: minio/minio:latest
    container_name: matrix-minio
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-matrix}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-matrix123}
      - MINIO_BROWSER_REDIRECT_URL=https://minio.yourdomain.com
    volumes:
      - minio-data:/data
    deploy:
      resources:
        limits:
          memory: 800M
    networks:
      - matrix-app-net

  caddy:
    image: caddy:latest
    container_name: matrix-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./apps:/srv/apps
      - ./static:/srv/static
    networks:
      - matrix-app-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
  vizitka:
    build:
      context: ./apps/vizitka
      dockerfile: Dockerfile
    container_name: vizitka
    restart: always
    networks:
      - matrix-app-net

networks:
  matrix-app-net:
    name: matrix-app-net

volumes:
  db-data:
  minio-data:
  caddy_data:
  caddy_config:
