name: resonance

x-security: &security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  db:
    image: postgres:17.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?required}
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 2g
    cpus: 1.5
    networks: [internal]

  migrate:
    image: ${REGISTRY:?required}/resonance/backend:${RESONANCE_VERSION:?required}
    command: ["python", "-m", "app.migrate"]
    restart: "no"
    profiles: ["tools"]
    env_file: ${ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    tmpfs: ["/tmp"]
    networks: [internal]
    <<: *security

  backend:
    image: ${REGISTRY:?required}/resonance/backend:${RESONANCE_VERSION:?required}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "${BACKEND_WORKERS:-1}"]
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      RUN_MIGRATIONS_ON_STARTUP: "false"
    read_only: true
    tmpfs: ["/tmp"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    mem_limit: 1g
    cpus: 1.0
    networks: [internal]
    <<: *security

  bot:
    image: ${REGISTRY:?required}/resonance/backend:${RESONANCE_VERSION:?required}
    command: ["python", "-m", "app.bot"]
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      RUN_MIGRATIONS_ON_STARTUP: "false"
    read_only: true
    tmpfs: ["/tmp"]
    depends_on:
      backend:
        condition: service_healthy
    mem_limit: 512m
    cpus: 0.5
    networks: [internal]
    <<: *security

  frontend:
    image: ${REGISTRY:?required}/resonance/frontend:${RESONANCE_VERSION:?required}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    depends_on:
      backend:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.5
    networks: [internal]
    <<: *security

  minio:
    image: minio/minio:RELEASE.2026-04-18T19-56-12Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?required}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?required}
      MINIO_BROWSER_REDIRECT_URL: https://${MINIO_CONSOLE_DOMAIN:?required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
    mem_limit: 1g
    cpus: 1.0
    networks: [internal]
    security_opt:
      - no-new-privileges:true

  gateway:
    image: ${REGISTRY:?required}/resonance/gateway:${RESONANCE_VERSION:?required}
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?required}
      MINIO_CONSOLE_DOMAIN: ${MINIO_CONSOLE_DOMAIN:?required}
      S3_BUCKET: ${S3_BUCKET:?required}
      ACME_EMAIL: ${ACME_EMAIL:?required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.5
    networks: [internal]
    security_opt:
      - no-new-privileges:true

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  minio_data:
  caddy_data:
  caddy_config:
