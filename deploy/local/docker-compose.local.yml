name: resonance-local

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resonance}
      POSTGRES_USER: ${POSTGRES_USER:-resonance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resonance-local-password}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - local

  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-resonance}:${POSTGRES_PASSWORD:-resonance-local-password}@db:5432/${POSTGRES_DB:-resonance}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-resonance-local-jwt-secret-change-before-sharing}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-4320}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-resonance-local-admin-password}
      RUN_MIGRATIONS_ON_STARTUP: ${RUN_MIGRATIONS_ON_STARTUP:-true}
      MATRIX_HOMESERVER: ${MATRIX_HOMESERVER:-https://matrix.example.com}
      MATRIX_USER_ID: ${MATRIX_USER_ID:-@bot:example.com}
      MATRIX_ACCESS_TOKEN: ${MATRIX_ACCESS_TOKEN:-}
      MATRIX_DEVICE_ID: ${MATRIX_DEVICE_ID:-}
      MATRIX_PASSWORD: ${MATRIX_PASSWORD:-}
      MATRIX_DM_ENABLED: ${MATRIX_DM_ENABLED:-false}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_NAME: ${TELEGRAM_BOT_NAME:-ResonanceBot}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-resonance}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-resonance-local-minio-password}
      S3_BUCKET: ${S3_BUCKET:-attachments}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:8080/files}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      KANBAN_API_BASE_URL: ${KANBAN_API_BASE_URL:-https://kanban.devds.ru/api}
      KANBAN_API_TOKEN: ${KANBAN_API_TOKEN:-}
      KANBAN_TIMEOUT_SECONDS: ${KANBAN_TIMEOUT_SECONDS:-20}
      KANBAN_BUNDLE_TASK_PAGE_SIZE: ${KANBAN_BUNDLE_TASK_PAGE_SIZE:-250}
      KANBAN_BUNDLE_CACHE_TTL_SECONDS: ${KANBAN_BUNDLE_CACHE_TTL_SECONDS:-45}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - local

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/frontend.Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - local

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-resonance}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-resonance-local-minio-password}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - local

  gateway:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - local

  bot:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    command: ["python", "-m", "app.bot"]
    restart: unless-stopped
    profiles:
      - bot
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-resonance}:${POSTGRES_PASSWORD:-resonance-local-password}@db:5432/${POSTGRES_DB:-resonance}
      JWT_SECRET: ${JWT_SECRET:-resonance-local-jwt-secret-change-before-sharing}
      RUN_MIGRATIONS_ON_STARTUP: "false"
      MATRIX_HOMESERVER: ${MATRIX_HOMESERVER:-https://matrix.example.com}
      MATRIX_USER_ID: ${MATRIX_USER_ID:-@bot:example.com}
      MATRIX_ACCESS_TOKEN: ${MATRIX_ACCESS_TOKEN:-}
      MATRIX_DEVICE_ID: ${MATRIX_DEVICE_ID:-}
      MATRIX_PASSWORD: ${MATRIX_PASSWORD:-}
      MATRIX_DM_ENABLED: ${MATRIX_DM_ENABLED:-false}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_NAME: ${TELEGRAM_BOT_NAME:-ResonanceBot}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - local

networks:
  local:
    driver: bridge

volumes:
  pgdata:
  minio_data:
  caddy_data:
  caddy_config:
