kind = "mobile"
previewPath = "/mobile/"
title = "Татаринов Игорь — Мобильная визитка"
version = "1.0.0"
id = "artifacts/portfolio-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 21133

[services.development]
run = "pnpm --filter @workspace/portfolio-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/portfolio-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/portfolio-mobile", "run", "serve" ]

[services.env]
PORT = "21133"
BASE_PATH = "/mobile/"
