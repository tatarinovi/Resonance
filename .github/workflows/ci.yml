name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-24.04
    env:
      JWT_SECRET: ci-secret-key
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: admin-password
      DATABASE_URL: sqlite+pysqlite:///:memory:
      RUN_MIGRATIONS_ON_STARTUP: "false"
      RUN_STARTUP_DIGEST_TEST: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libolm-dev

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        run: pytest backend/tests

  frontend-tests:
    name: Frontend checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:run

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  release-config:
    name: Release config gate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate production compose
        env:
          ENV_FILE: .env.example
        run: docker compose -f deploy/production/docker-compose.production.yml --env-file deploy/production/.env.example config > /dev/null

      - name: Scan current tree for obvious secrets
        run: |
          python - <<'PY'
          import re
          import subprocess
          import sys

          patterns = [
              re.compile(r"AKIA[0-9A-Z]{16}"),
              re.compile(r"ASIA[0-9A-Z]{16}"),
              re.compile(r"ghp_[A-Za-z0-9_]{36,}"),
              re.compile(r"github_pat_[A-Za-z0-9_]+"),
              re.compile(r"xox[baprs]-[A-Za-z0-9-]+"),
              re.compile(r"sk-[A-Za-z0-9]{20,}"),
              re.compile(r"[0-9]{8,10}:[A-Za-z0-9_-]{35,}"),
              re.compile(r"-----BEGIN (?:RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----"),
          ]
          excluded_paths = {
              "frontend/package-lock.json",
              "package-lock.json",
              "helps/v1.json",
          }

          files = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          findings: list[str] = []
          for path in files:
              if path in excluded_paths:
                  continue
              try:
                  data = open(path, "rb").read().decode("utf-8", errors="ignore")
              except OSError:
                  continue
              for line_no, line in enumerate(data.splitlines(), start=1):
                  if any(p.search(line) for p in patterns):
                      findings.append(f"{path}:{line_no}")

          if findings:
              print("Potential secrets found:")
              print("\n".join(sorted(set(findings))[:200]))
              sys.exit(1)
          print("Secret scan passed.")
          PY
