name: Deploy to VPS (legacy source build)

on:
  push:
    branches:
      - main

env:
  DEPLOY_DIR: /root/infrastructure

jobs:
  copy-files:
    name: Copy files
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "."
          target: ${{ env.DEPLOY_DIR }}
          rm: false

  build-and-restart:
    name: Build and restart
    runs-on: ubuntu-24.04
    needs: copy-files

    steps:
      - name: Build and restart services on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          script: |
            set -eu

            cd "${{ env.DEPLOY_DIR }}"
            LOG_FILE="/tmp/resonance-deploy-${GITHUB_RUN_ID:-manual}.log"
            : > "$LOG_FILE"

            show_build_error() {
              echo "::error::Deploy build failed. Full server log: $LOG_FILE"
              echo "Last 200 lines from the build log:"
              tail -n 200 "$LOG_FILE" || true
            }

            run_step() {
              title="$1"
              shift
              STEP_LOG="$(mktemp)"

              echo "::group::$title"
              if "$@" > "$STEP_LOG" 2>&1; then
                cat "$STEP_LOG"
                cat "$STEP_LOG" >> "$LOG_FILE"
                rm -f "$STEP_LOG"
              else
                status="$?"
                cat "$STEP_LOG"
                cat "$STEP_LOG" >> "$LOG_FILE"
                rm -f "$STEP_LOG"
                echo "::endgroup::"
                show_build_error
                exit "$status"
              fi
              echo "::endgroup::"
            }

            if docker compose version >/dev/null 2>&1; then
              run_step "Build Docker images" docker compose build --progress=plain
              run_step "Restart Docker services" docker compose up -d --remove-orphans
            elif command -v docker-compose >/dev/null 2>&1; then
              run_step "Build Docker images" docker-compose build
              run_step "Restart Docker services" docker-compose up -d --remove-orphans
            else
              echo "::error::Docker Compose is not installed on the server"
              exit 1
            fi
